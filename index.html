<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hábitos" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Hábitos — Vibecode</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:dark;--bg:#0b1020;--card:#151c30;--muted:#94a3b8;--text:#f8fafc;--accent:#7c3aed;--ok:#22c55e}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#1f2a44 0,transparent 40%),var(--bg);color:var(--text);padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}
    main{max-width:560px;margin:0 auto;padding:28px 0 40px}h1{margin:0 0 6px;font-size:2rem;letter-spacing:-.04em}.subtitle{margin:0 0 24px;color:var(--muted)}
    .panel{background:rgba(21,28,48,.92);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,.25);backdrop-filter:blur(12px)}
    form{display:flex;gap:10px;margin-bottom:14px}input{flex:1;min-width:0;border:1px solid rgba(255,255,255,.12);background:#0f172a;color:var(--text);padding:14px;border-radius:14px;font-size:16px;outline:none}input:focus{border-color:var(--accent)}
    button{border:0;border-radius:14px;padding:12px 15px;font-size:15px;font-weight:700;color:white;background:var(--accent);cursor:pointer;-webkit-tap-highlight-color:transparent}button:active{transform:scale(.98)}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0 18px}.stat{background:#0f172a;border-radius:16px;padding:14px}.stat strong{display:block;font-size:1.5rem;margin-bottom:4px}.stat span{color:var(--muted);font-size:.9rem}
    ul{list-style:none;padding:0;margin:0;display:grid;gap:10px}.habit{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:#0f172a;border-radius:16px;padding:12px}.check{width:44px;height:44px;padding:0;border-radius:50%;background:#1e293b;font-size:20px}.habit.done .check{background:var(--ok)}.habit.done .name{text-decoration:line-through;opacity:.65}.name{font-weight:700}.meta{color:var(--muted);font-size:.82rem;margin-top:3px}.delete{background:transparent;color:#fca5a5;padding:8px;font-size:18px}.empty{color:var(--muted);text-align:center;padding:26px 10px 10px}footer{text-align:center;color:var(--muted);font-size:.82rem;margin-top:18px}
  </style>
</head>
<body>
  <main>
    <h1>Hábitos</h1>
    <p class="subtitle">Um app vibecoded, simples e offline.</p>
    <section class="panel">
      <form id="habit-form">
        <input id="habit-input" type="text" maxlength="50" placeholder="Ex.: Beber água" autocomplete="off" required />
        <button type="submit">Adicionar</button>
      </form>
      <div class="stats">
        <div class="stat"><strong id="done-count">0</strong><span>concluídos hoje</span></div>
        <div class="stat"><strong id="total-count">0</strong><span>hábitos cadastrados</span></div>
      </div>
      <ul id="habit-list"></ul>
      <div id="empty-state" class="empty">Adicione seu primeiro hábito.</div>
    </section>
    <footer>Os dados ficam salvos apenas neste aparelho.</footer>
  </main>
  <script>
    const STORAGE_KEY="vibecode-habitos-v1";
    const TODAY=new Date().toISOString().slice(0,10);
    const form=document.querySelector("#habit-form"),input=document.querySelector("#habit-input"),list=document.querySelector("#habit-list"),emptyState=document.querySelector("#empty-state"),doneCount=document.querySelector("#done-count"),totalCount=document.querySelector("#total-count");
    let habits=loadHabits();
    function loadHabits(){try{return (JSON.parse(localStorage.getItem(STORAGE_KEY))||[]).map(h=>({...h,done:h.lastCompleted===TODAY}))}catch{return[]}}
    function saveHabits(){localStorage.setItem(STORAGE_KEY,JSON.stringify(habits))}
    function render(){list.innerHTML="";habits.forEach(habit=>{const item=document.createElement("li");item.className=`habit ${habit.done?"done":""}`;const check=document.createElement("button");check.className="check";check.type="button";check.setAttribute("aria-label",habit.done?"Desmarcar hábito":"Concluir hábito");check.textContent=habit.done?"✓":"";check.addEventListener("click",()=>toggleHabit(habit.id));const info=document.createElement("div"),name=document.createElement("div"),meta=document.createElement("div");name.className="name";name.textContent=habit.name;meta.className="meta";meta.textContent=habit.done?"Feito hoje":"Pendente hoje";info.append(name,meta);const del=document.createElement("button");del.className="delete";del.type="button";del.setAttribute("aria-label","Excluir hábito");del.textContent="✕";del.addEventListener("click",()=>deleteHabit(habit.id));item.append(check,info,del);list.appendChild(item)});doneCount.textContent=habits.filter(h=>h.done).length;totalCount.textContent=habits.length;emptyState.hidden=habits.length>0}
    function addHabit(name){habits.unshift({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),name,done:false,lastCompleted:null});saveHabits();render()}
    function toggleHabit(id){habits=habits.map(h=>{if(h.id!==id)return h;const done=!h.done;return{...h,done,lastCompleted:done?TODAY:null}});saveHabits();render()}
    function deleteHabit(id){habits=habits.filter(h=>h.id!==id);saveHabits();render()}
    form.addEventListener("submit",event=>{event.preventDefault();const name=input.value.trim();if(!name)return;addHabit(name);input.value="";input.focus()});
    if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
    render();
  </script>
</body>
</html>
