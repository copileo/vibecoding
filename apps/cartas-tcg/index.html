<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Cartas TCG"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>Cartas TCG — Vibecode</title><style>:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:dark;--bg:#080d1a;--p:#121a2d;--f:#0f172a;--m:#94a3b8;--a:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#f8fafc;padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom)}main{max-width:900px;margin:auto;padding:20px 0 40px}.back{color:#fde68a;text-decoration:none}h1{margin:16px 0 4px}.sub,.help,footer{color:var(--m)}.tabs,.actions{display:flex;gap:8px;overflow:auto;flex-wrap:wrap}.tabs{margin:20px 0 14px}.tab[aria-selected=true],button{background:var(--a);color:#201500}.view[hidden]{display:none}.panel{background:var(--p);border:1px solid #ffffff18;border-radius:20px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{display:grid;gap:7px;font-weight:700}input,select{width:100%;padding:13px;border-radius:12px;border:1px solid #ffffff18;background:var(--f);color:#fff;font-size:16px}button{border:0;border-radius:12px;padding:12px 15px;min-height:44px;font-weight:800}.secondary{background:#263247;color:#fff}.danger{background:transparent;color:#fca5a5;border:1px solid #ef444455}.status{min-height:22px;color:#bfdbfe;margin-top:10px}.previews{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card,.print-card{position:relative;aspect-ratio:63/88;overflow:hidden;border-radius:4.5%;background:linear-gradient(145deg,#18243a,#07101f);border:1px solid #ffffff2e;color:#fff}.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.art{position:absolute;left:7%;top:16%;width:86%;height:58%;object-fit:cover}.logo{position:absolute;right:5%;top:4%;max-width:25%;max-height:9%}.name{position:absolute;left:6%;right:31%;top:5%;font-weight:900;text-shadow:0 1px 3px #000}.meta{position:absolute;left:6%;right:6%;bottom:5%;display:flex;justify-content:space-between;font-weight:800;text-shadow:0 1px 3px #000}.backmark{position:absolute;inset:0;display:grid;place-items:center;font-weight:900;text-align:center;padding:12%}.caption{text-align:center;color:var(--m);font-size:.8rem;margin-top:6px}.list{display:grid;gap:9px}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--f);padding:12px;border-radius:14px}.row small{display:block;color:var(--m);margin-top:4px}.rowactions{display:flex;gap:7px;align-items:center}.qty{width:70px}.empty{text-align:center;color:var(--m);padding:18px}footer{text-align:center;font-size:.82rem;margin-top:18px}#print-sheet{display:none}@media(max-width:620px){.grid,.previews{grid-template-columns:1fr}.row{grid-template-columns:1fr}.rowactions{justify-content:flex-end}}@page{size:A4 portrait;margin:10mm}@media print{body{background:#fff;padding:0}main{display:none}#print-sheet{display:grid!important;grid-template-columns:repeat(3,63mm);grid-auto-rows:88mm;gap:4mm}.print-card{width:63mm;height:88mm;aspect-ratio:auto;border-radius:2.5mm;border:.2mm solid #777}.print-card .name{font-size:3.5mm}.print-card .meta{font-size:2.5mm}}</style></head><body><main><a class="back" href="../../">← Hub</a><h1>Cartas TCG</h1><p class="sub">Franquias, coleções e cartas separadas, com impressão A4.</p><nav class="tabs"><button class="tab" data-v="card" aria-selected="true">Nova carta</button><button class="tab" data-v="franchises">Franquias</button><button class="tab" data-v="collections">Coleções</button><button class="tab" data-v="cards">Cartas</button><button class="tab" data-v="print">Imprimir</button></nav><section id="card" class="view"><form id="cf" class="panel"><div class="grid"><label>Nome<input id="cn" required maxlength="70"></label><label>Coleção<select id="cc" required></select></label><label>Número<input id="num" inputmode="numeric"></label><label>Ilustração<input id="art" type="file" accept="image/*"></label><label>Fundo frontal<input id="front" type="file" accept="image/*"></label><label>Fundo traseiro<input id="back" type="file" accept="image/*"></label></div><div class="actions"><button>Salvar carta</button><button type="button" class="secondary" id="clear">Limpar</button></div><div id="cs" class="status"></div></form><div class="panel previews"><div><div id="fp" class="card"></div><div class="caption">Frente</div></div><div><div id="bp" class="card"></div><div class="caption">Verso</div></div></div></section><section id="franchises" class="view" hidden><form id="ff" class="panel"><div class="grid"><label>Nome<input id="fn" required></label><label>Logo<input id="fl" type="file" accept="image/*"></label></div><div class="actions"><button>Adicionar franquia</button></div><div id="fs" class="status"></div></form><div class="panel"><div id="fList" class="list"></div><div id="fEmpty" class="empty">Nenhuma franquia cadastrada.</div></div></section><section id="collections" class="view" hidden><form id="cof" class="panel"><div class="grid"><label>Nome<input id="con" required></label><label>Franquia<select id="cofr" required></select></label><label>Total de cartas (opcional)<input id="cot" inputmode="numeric"></label></div><div class="actions"><button>Adicionar coleção</button></div><div id="cos" class="status"></div></form><div class="panel"><div id="coList" class="list"></div><div id="coEmpty" class="empty">Nenhuma coleção cadastrada.</div></div></section><section id="cards" class="view" hidden><div class="panel"><div id="cList" class="list"></div><div id="cEmpty" class="empty">Nenhuma carta salva.</div></div></section><section id="print" class="view" hidden><div class="panel"><p class="help">Imprima em A4, escala 100%, sem “Ajustar à página”.</p><div class="actions"><button id="pf">Imprimir frentes</button><button id="pb" class="secondary">Imprimir versos</button></div><div id="ps" class="status"></div></div></section><footer id="ver"></footer></main><section id="print-sheet"></section><script>const VERSION="1.1.0",DB="vibecode-cartas-tcg-v2",S=["franchises","collections","cards"],$=s=>document.querySelector(s);let db,franchises=[],collections=[],cards=[],urls=[];const id=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random().toString(16).slice(2);function open(){return new Promise((ok,no)=>{let r=indexedDB.open(DB,1);r.onupgradeneeded=()=>S.forEach(s=>{if(!r.result.objectStoreNames.contains(s))r.result.createObjectStore(s,{keyPath:"id"})});r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}function st(n,m="readonly"){return db.transaction(n,m).objectStore(n)}function all(n){return new Promise((ok,no)=>{let r=st(n).getAll();r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}function put(n,v){return new Promise((ok,no)=>{let r=st(n,"readwrite").put(v);r.onsuccess=ok;r.onerror=()=>no(r.error)})}function rem(n,i){return new Promise((ok,no)=>{let r=st(n,"readwrite").delete(i);r.onsuccess=ok;r.onerror=()=>no(r.error)})}function u(b){if(!b)return"";let x=URL.createObjectURL(b);urls.push(x);return x}function clearU(){urls.forEach(URL.revokeObjectURL);urls=[]}function e(t,c,x){let n=document.createElement(t);if(c)n.className=c;if(x!==undefined)n.textContent=x;return n}function rel(c){let co=collections.find(x=>x.id===c.collectionId),f=franchises.find(x=>x.id===co?.franchiseId);return{co,f}}function node(c,side="front",p=false){let r=e("article",p?"print-card":"card"),{co,f}=rel(c),bg=side==="front"?c.front:c.back;if(bg){let i=new Image;i.className="bg";i.src=u(bg);r.append(i)}if(side==="front"){if(c.art){let i=new Image;i.className="art";i.src=u(c.art);r.append(i)}if(f?.logo){let i=new Image;i.className="logo";i.src=u(f.logo);r.append(i)}r.append(e("div","name",c.name||"Nome da carta"));let m=e("div","meta");m.append(e("span","",co?.name||"Coleção"),e("span","",c.number?(co?.total?c.number+"/"+co.total:c.number):"—"));r.append(m)}else r.append(e("div","backmark",f?.name||"TCG"));return r}function preview(){clearU();let c={name:$("#cn").value,collectionId:$("#cc").value,number:$("#num").value,art:$("#art").files[0],front:$("#front").files[0],back:$("#back").files[0]};$("#fp").replaceChildren(...node(c).childNodes);$("#bp").replaceChildren(...node(c,"back").childNodes)}function selects(){let f=$("#cofr"),c=$("#cc");f.replaceChildren(new Option("Selecione",""));franchises.forEach(x=>f.add(new Option(x.name,x.id)));c.replaceChildren(new Option("Selecione",""));collections.forEach(x=>{let f=franchises.find(y=>y.id===x.franchiseId);c.add(new Option((f?f.name+" · ":"")+x.name,x.id))})}function row(a,b){let r=e("div","row"),i=e("div"),ac=e("div","rowactions");i.append(e("strong","",a),e("small","",b));r.append(i,ac);return{r,ac}}function dbtn(fn){let b=e("button","danger","Excluir");b.type="button";b.onclick=fn;return b}async function refresh(){clearU();[franchises,collections,cards]=await Promise.all(S.map(all));selects();let fl=$("#fList"),cl=$("#coList"),cal=$("#cList");fl.textContent=cl.textContent=cal.textContent="";franchises.forEach(x=>{let z=row(x.name,x.logo?"Com logo":"Sem logo");z.ac.append(dbtn(async()=>{if(collections.some(c=>c.franchiseId===x.id))return alert("Exclua primeiro as coleções desta franquia.");await rem("franchises",x.id);refresh()}));fl.append(z.r)});collections.forEach(x=>{let f=franchises.find(y=>y.id===x.franchiseId),z=row(x.name,(f?.name||"Sem franquia")+(x.total?" · "+x.total+" cartas":""));z.ac.append(dbtn(async()=>{if(cards.some(c=>c.collectionId===x.id))return alert("Exclua primeiro as cartas desta coleção.");await rem("collections",x.id);refresh()}));cl.append(z.r)});cards.forEach(x=>{let z=row(x.name,(rel(x).co?.name||"Sem coleção")+" · "+(x.number||"—")),q=document.createElement("input");q.type="number";q.min=0;q.max=99;q.className="qty";q.value=x.copies??1;q.onchange=async()=>{x.copies=Math.max(0,Math.min(99,Number(q.value)||0));await put("cards",x)};z.ac.append(q,dbtn(async()=>{if(confirm("Excluir “"+x.name+"”?")){await rem("cards",x.id);refresh()}}));cal.append(z.r)});$("#fEmpty").hidden=franchises.length;$("#coEmpty").hidden=collections.length;$("#cEmpty").hidden=cards.length;preview()}$("#ff").onsubmit=async ev=>{ev.preventDefault();await put("franchises",{id:id(),name:$("#fn").value.trim(),logo:$("#fl").files[0]||null});ev.target.reset();$("#fs").textContent="Franquia adicionada.";refresh()};$("#cof").onsubmit=async ev=>{ev.preventDefault();await put("collections",{id:id(),name:$("#con").value.trim(),franchiseId:$("#cofr").value,total:$("#cot").value.trim()});ev.target.reset();$("#cos").textContent="Coleção adicionada.";refresh()};$("#cf").onsubmit=async ev=>{ev.preventDefault();try{if(!$("#cc").value)throw Error("Cadastre e selecione uma coleção.");await put("cards",{id:id(),name:$("#cn").value.trim(),collectionId:$("#cc").value,number:$("#num").value.trim(),art:$("#art").files[0]||null,front:$("#front").files[0]||null,back:$("#back").files[0]||null,copies:1});ev.target.reset();$("#cs").textContent="Carta salva.";refresh()}catch(x){$("#cs").textContent=x.message}};$("#clear").onclick=()=>{$("#cf").reset();preview()};$("#cf").addEventListener("input",preview);$("#cf").addEventListener("change",preview);document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));document.querySelectorAll(".view").forEach(v=>v.hidden=v.id!==t.dataset.v)});function print(side){clearU();let s=$("#print-sheet");s.textContent="";cards.forEach(c=>{for(let i=0;i<(c.copies||0);i++)s.append(node(c,side,true))});if(!s.children.length)return $("#ps").textContent="Defina ao menos uma cópia.";setTimeout(()=>window.print(),100)}$("#pf").onclick=()=>print("front");$("#pb").onclick=()=>print("back");$("#ver").textContent="Cartas TCG · v"+VERSION;open().then(x=>{db=x;refresh()}).catch(x=>$("#cs").textContent="Erro no armazenamento: "+x.message);if("serviceWorker"in navigator)addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));</script></body></html>
